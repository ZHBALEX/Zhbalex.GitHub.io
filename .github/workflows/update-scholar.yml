name: Update Scholar publications

on:
  workflow_dispatch:
  schedule:
    - cron: "20 9 * * 1"

permissions:
  contents: write

jobs:
  update-scholar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r google_scholar_crawler/requirements.txt

      - name: Sync Google Scholar data
        run: python scripts/update_scholar.py

      - name: Compile CV
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: CV
          root_file: CV_Haobo_Zhao_2024.tex
          latexmk_use_xelatex: false

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Scholar publications"
          file_pattern: "_data/scholar_publications.yml CV/generated_publications.tex CV/CV_Haobo_Zhao_2024.pdf google_scholar_crawler/results/gs_data.json"
